<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>SHIFT · Manager</title>
<link rel="icon" type="image/svg+xml" href="SHIFT-ICON.svg"/>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;600;800&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
@font-face{font-family:'SHIFTBrand';src:url('fonts/shift-brand.woff2') format('woff2'),url('fonts/shift-brand.woff') format('woff');font-weight:normal;font-style:normal;font-display:swap;}
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#000;--surface:#0a0a0a;--border:#1a1a1a;--white:#fff;--gray:#888;--dim:#444;--accent:#fff;--red:#ff4444}
body{background:var(--bg);color:var(--white);font-family:'Inter',sans-serif;min-height:100vh;display:flex;flex-direction:column}
/* LOGIN */
#login-screen{flex:1;display:flex;align-items:center;justify-content:center;padding:32px}
.login-box{width:100%;max-width:400px;border:1px solid var(--border);padding:48px 40px;text-align:center}
.login-logo{display:flex;align-items:center;gap:10px;justify-content:center;margin-bottom:4px}
.login-logo img{height:32px;width:auto;filter:brightness(0) invert(1)}
.login-logo span{font-family:'SHIFTBrand',sans-serif;font-size:28px;line-height:1;color:var(--white);letter-spacing:0.5em}
.login-sub{font-size:11px;font-weight:600;letter-spacing:.22em;text-transform:uppercase;color:var(--dim);margin-bottom:40px}
.login-label{display:block;font-size:11px;font-weight:600;letter-spacing:.18em;text-transform:uppercase;color:var(--dim);margin-bottom:10px;text-align:left}
.login-input{width:100%;background:transparent;border:1px solid var(--border);color:var(--white);font-family:'Inter',sans-serif;font-size:15px;padding:14px 16px;outline:none;transition:border-color .2s}
.login-input:focus{border-color:#555}
.login-btn{width:100%;margin-top:20px;background:var(--white);color:#000;font-family:'Inter',sans-serif;font-size:11px;font-weight:600;letter-spacing:.22em;text-transform:uppercase;padding:16px;border:none;cursor:pointer;transition:opacity .2s}
.login-btn:hover{opacity:.85}
.login-err{font-size:12px;color:var(--red);margin-top:14px;min-height:18px}
/* APP */
#app{flex:1;display:none;flex-direction:column}
header{border-bottom:1px solid var(--border);padding:0 32px;display:flex;align-items:center;justify-content:space-between;height:64px}
.logo{display:flex;align-items:center;gap:8px}
.logo img{height:26px;width:auto;filter:brightness(0) invert(1)}
.logo span{font-family:'SHIFTBrand',sans-serif;font-size:22px;line-height:1;color:var(--white);letter-spacing:0.5em}
.header-badge{font-size:10px;font-weight:600;letter-spacing:.2em;text-transform:uppercase;color:var(--dim);background:var(--border);padding:5px 12px}
.logout-btn{font-size:11px;font-weight:600;letter-spacing:.18em;text-transform:uppercase;color:var(--gray);cursor:pointer;background:none;border:none}
.logout-btn:hover{color:var(--white)}
.open-portal-btn{font-size:11px;font-weight:600;letter-spacing:.18em;text-transform:uppercase;background:transparent;border:1px solid var(--border);color:var(--white);padding:8px 18px;cursor:pointer;font-family:'Inter',sans-serif;transition:border-color .2s}
.open-portal-btn:hover{border-color:#555}
main{flex:1;max-width:900px;width:100%;margin:0 auto;padding:48px 32px}
.section-label{font-size:10px;font-weight:600;letter-spacing:.28em;text-transform:uppercase;color:var(--dim);margin-bottom:20px}
h2{font-family:'Sora',sans-serif;font-weight:800;font-size:28px;letter-spacing:-.03em;margin-bottom:32px}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:20px}
@media(max-width:600px){.form-grid{grid-template-columns:1fr}}
.field{display:flex;flex-direction:column;gap:8px}
.field label{font-size:11px;font-weight:600;letter-spacing:.18em;text-transform:uppercase;color:var(--dim)}
.field input,.field select{background:transparent;border:1px solid var(--border);color:var(--white);font-family:'Inter',sans-serif;font-size:14px;padding:13px 16px;outline:none;transition:border-color .2s;width:100%}
.field input:focus,.field select:focus{border-color:#555}
.field select option{background:#111;color:#fff}
.gen-btn{background:var(--white);color:#000;font-family:'Inter',sans-serif;font-size:11px;font-weight:600;letter-spacing:.22em;text-transform:uppercase;padding:16px 32px;border:none;cursor:pointer;transition:opacity .2s;margin-top:4px}
.gen-btn:hover{opacity:.85}
.result-box{margin-top:32px;border:1px solid var(--border);padding:28px;display:none}
.result-label{font-size:10px;font-weight:600;letter-spacing:.28em;text-transform:uppercase;color:var(--dim);margin-bottom:12px}
.url-display{font-family:'Inter',sans-serif;font-size:13px;color:var(--gray);word-break:break-all;background:#0a0a0a;border:1px solid var(--border);padding:14px 16px;margin-bottom:16px;line-height:1.6}
.copy-btn{font-family:'Inter',sans-serif;font-size:11px;font-weight:600;letter-spacing:.18em;text-transform:uppercase;background:transparent;border:1px solid var(--border);color:var(--white);padding:11px 22px;cursor:pointer;transition:border-color .2s}
.copy-btn:hover{border-color:#555}
.copy-btn.copied{border-color:#4ade80;color:#4ade80}
.expiry-note{font-size:12px;color:var(--dim);margin-top:12px}
/* History */
.history-section{margin-top:56px;border-top:1px solid var(--border);padding-top:40px}
.history-empty{font-size:13px;color:var(--dim);padding:24px 0}
.hist-item{border:1px solid var(--border);padding:20px 24px;margin-bottom:12px;display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap}
.hist-name{font-family:'Sora',sans-serif;font-weight:600;font-size:15px}
.hist-meta{font-size:11px;color:var(--dim);margin-top:4px}
.hist-meta .expired{color:var(--red)}
.hist-actions{display:flex;gap:10px;flex-shrink:0}
.hist-copy,.hist-del{font-size:10px;font-weight:600;letter-spacing:.18em;text-transform:uppercase;background:transparent;border:1px solid var(--border);color:var(--gray);padding:8px 14px;cursor:pointer;font-family:'Inter',sans-serif}
.hist-copy:hover{border-color:#555;color:var(--white)}
.hist-del{border-color:transparent;color:var(--dim)}
.hist-del:hover{color:var(--red)}
.hist-copy.copied{border-color:#4ade80;color:#4ade80}
</style>
</head>
<body>

<!-- LOGIN SCREEN -->
<div id="login-screen">
  <div class="login-box">
    <div class="login-logo"><img src="SHIFT-ICON.svg" alt=""/><span>SHIFT</span></div>
    <div class="login-sub">Manager Access</div>
    <label class="login-label" for="pw">Password</label>
    <input class="login-input" type="password" id="pw" placeholder="Enter password" onkeydown="if(event.key==='Enter')doLogin()"/>
    <button class="login-btn" onclick="doLogin()">Enter</button>
    <div class="login-err" id="login-err"></div>
  </div>
</div>

<!-- APP -->
<div id="app">
  <header>
    <div class="logo"><img src="SHIFT-ICON.svg" alt=""/><span>SHIFT</span></div>
    <div class="header-badge">Manager Portal</div>
    <div style="display:flex;align-items:center;gap:16px">
      <button class="open-portal-btn" id="open-portal-btn" onclick="openPortal()">View Portal ↗</button>
      <button class="logout-btn" onclick="doLogout()">Log Out</button>
    </div>
  </header>
  <main>
    <div class="section-label">Client Access</div>
    <h2>Generate Portal Link</h2>

    <div class="form-grid">
      <div class="field">
        <label for="client-name">Client Name</label>
        <input type="text" id="client-name" placeholder="e.g. Priya & Raj Wedding"/>
      </div>
      <div class="field">
        <label for="expiry-days">Link Expires In</label>
        <select id="expiry-days">
          <option value="7">7 days</option>
          <option value="14" selected>14 days</option>
          <option value="30">30 days</option>
          <option value="60">60 days</option>
          <option value="90">90 days</option>
        </select>
      </div>
    </div>
    <button class="gen-btn" onclick="generateLink()">Generate Link</button>

    <div class="result-box" id="result-box">
      <div class="result-label">Shareable Link</div>
      <div class="url-display" id="url-display"></div>
      <button class="copy-btn" id="copy-btn" onclick="copyLink()">Copy Link</button>
      <div class="expiry-note" id="expiry-note"></div>
    </div>

    <div class="history-section">
      <div class="section-label">Generated Links</div>
      <div id="history-list"></div>
    </div>
  </main>
</div>

<script>
// ── CONFIG ───────────────────────────────────────────────────
// Must match SHIFT_proposals_hub.html exactly
const _SK = 'SHIFTportal#2026$key!xK9mPq3';

// Manager password — change this to something only you know
const MANAGER_PW = 'SHIFT2026';

// Base URL for portal (update if domain changes)
const PORTAL_URL = 'https://shiftevnts.com/SHIFT_proposals_hub.html';
// ─────────────────────────────────────────────────────────────

async function _hmac(msg) {
  const k = await crypto.subtle.importKey('raw', new TextEncoder().encode(_SK),
    {name:'HMAC',hash:'SHA-256'}, false, ['sign']);
  const sig = await crypto.subtle.sign('HMAC', k, new TextEncoder().encode(msg));
  return Array.from(new Uint8Array(sig)).map(b=>b.toString(16).padStart(2,'0')).join('');
}

async function generateLink() {
  const name = document.getElementById('client-name').value.trim();
  const days = parseInt(document.getElementById('expiry-days').value);
  if (!name) { alert('Please enter a client name.'); return; }

  const exp = Math.floor(Date.now()/1000) + days * 86400;
  const payload = `${name}|${exp}`;
  const sig = (await _hmac(payload)).slice(0, 32);
  const token = btoa(payload) + '.' + sig;
  const url = `${PORTAL_URL}?t=${encodeURIComponent(token)}`;

  document.getElementById('url-display').textContent = url;
  document.getElementById('result-box').style.display = 'block';
  document.getElementById('copy-btn').textContent = 'Copy Link';
  document.getElementById('copy-btn').classList.remove('copied');

  const expDate = new Date(exp*1000).toLocaleDateString('en-US',{month:'long',day:'numeric',year:'numeric'});
  document.getElementById('expiry-note').textContent = `Expires: ${expDate}`;

  // Save to history
  const history = JSON.parse(localStorage.getItem('shift-links') || '[]');
  history.unshift({ name, exp, url, created: Date.now() });
  localStorage.setItem('shift-links', JSON.stringify(history.slice(0,50)));
  renderHistory();
}

function copyLink(url, btn) {
  const theUrl = url || document.getElementById('url-display').textContent;
  const theBtn = btn || document.getElementById('copy-btn');
  navigator.clipboard.writeText(theUrl).then(() => {
    theBtn.textContent = 'Copied ✓';
    theBtn.classList.add('copied');
    setTimeout(() => { theBtn.textContent = 'Copy Link'; theBtn.classList.remove('copied'); }, 2000);
  });
}

function renderHistory() {
  const list = document.getElementById('history-list');
  const history = JSON.parse(localStorage.getItem('shift-links') || '[]');
  if (!history.length) {
    list.innerHTML = '<div class="history-empty">No links generated yet.</div>';
    return;
  }
  list.innerHTML = history.map((item, i) => {
    const isExpired = Date.now()/1000 > item.exp;
    const expDate = new Date(item.exp*1000).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});
    const createdDate = new Date(item.created).toLocaleDateString('en-US',{month:'short',day:'numeric'});
    return `<div class="hist-item">
      <div>
        <div class="hist-name">${item.name}</div>
        <div class="hist-meta">Created ${createdDate} · <span class="${isExpired?'expired':''}">Expires ${expDate}${isExpired?' (expired)':''}</span></div>
      </div>
      <div class="hist-actions">
        <button class="hist-copy" id="hb-${i}" onclick="copyHistLink(${i})">${isExpired?'Expired':'Copy Link'}</button>
        <button class="hist-del" onclick="delHistLink(${i})">✕</button>
      </div>
    </div>`;
  }).join('');
}

function copyHistLink(i) {
  const history = JSON.parse(localStorage.getItem('shift-links') || '[]');
  const item = history[i];
  if (!item || Date.now()/1000 > item.exp) return;
  const btn = document.getElementById(`hb-${i}`);
  navigator.clipboard.writeText(item.url).then(() => {
    btn.textContent = 'Copied ✓';
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = 'Copy Link'; btn.classList.remove('copied'); }, 2000);
  });
}

function delHistLink(i) {
  const history = JSON.parse(localStorage.getItem('shift-links') || '[]');
  history.splice(i, 1);
  localStorage.setItem('shift-links', JSON.stringify(history));
  renderHistory();
}

async function openPortal() {
  // Generate a 365-day manager token
  const exp = Math.floor(Date.now()/1000) + 365 * 86400;
  const payload = `Manager|${exp}`;
  const sig = (await _hmac(payload)).slice(0, 32);
  const token = btoa(payload) + '.' + sig;
  window.open(`${PORTAL_URL}?t=${encodeURIComponent(token)}`, '_blank');
}

// ── AUTH ────────────────────────────────────────────────────
function doLogin() {
  const pw = document.getElementById('pw').value;
  if (pw === MANAGER_PW) {
    sessionStorage.setItem('shift-mgr', '1');
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('app').style.display = 'flex';
    renderHistory();
  } else {
    document.getElementById('login-err').textContent = 'Incorrect password.';
    document.getElementById('pw').value = '';
  }
}

function doLogout() {
  sessionStorage.removeItem('shift-mgr');
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('app').style.display = 'none';
  document.getElementById('pw').value = '';
}

// Auto-restore session
if (sessionStorage.getItem('shift-mgr') === '1') {
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('app').style.display = 'flex';
  document.addEventListener('DOMContentLoaded', renderHistory);
}
</script>
</body>
</html>
